name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.mod
      - name: Format
        run: test -z "$(gofmt -l cmd internal)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
      - name: End-to-end
        run: bash tests/e2e/local.sh
      - name: Build binaries
        run: make build

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t pulsemesh:${{ github.sha }} .
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: pulsemesh:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: pulsemesh:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

  deploy-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render Kubernetes manifests
        run: kubectl kustomize deploy/kubernetes >/tmp/rendered.yaml
      - name: Helm lint
        uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/pulsemesh && helm template pulsemesh deploy/helm/pulsemesh >/tmp/chart.yaml
      - name: Terraform validate
        uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=infra/terraform fmt -check && terraform -chdir=infra/terraform init -backend=false && terraform -chdir=infra/terraform validate
