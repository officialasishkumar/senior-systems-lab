services:
  pulsemesh:
    build: .
    image: pulsemesh:local
    environment:
      HTTP_ADDR: ":8080"
      TCP_ADDR: ":9090"
      UDP_ADDR: ":9091"
      LOG_LEVEL: info
      WORKERS: "4"
    ports:
      - "8080:8080"
      - "9090:9090"
      - "9091:9091/udp"
    healthcheck:
      test: ["CMD", "/pulsemesh", "--healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3

