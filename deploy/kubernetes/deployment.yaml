apiVersion: apps/v1
kind: Deployment
metadata:
  name: netops-lab
  namespace: netops-lab
  labels:
    app.kubernetes.io/name: netops-lab
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: netops-lab
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netops-lab
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: netops-lab
      terminationGracePeriodSeconds: 20
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: netops-lab
          image: ghcr.io/officialasishkumar/senior-systems-lab:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: netops-lab-config
          ports:
            - name: http
              containerPort: 8080
            - name: tcp
              containerPort: 9090
            - name: udp
              containerPort: 9091
              protocol: UDP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true

