apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: tcp
      port: 9090
      targetPort: tcp
    - name: udp
      port: 9091
      targetPort: udp
      protocol: UDP

